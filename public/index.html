<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Panel de administración La Casita - Gestión VPN/Proxy">
  <title>🏠 La Casita Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <!-- Login Screen -->
  <div id="login-screen" class="login-screen">
    <div class="login-container">
      <div class="login-glow"></div>
      <div class="login-card">
        <div class="login-logo">
          <i class="fas fa-house-chimney"></i>
        </div>
        <h1 class="login-title">La Casita</h1>
        <p class="login-subtitle">Panel de Administración v2026</p>
        <div id="login-error" class="login-error" style="display:none"></div>
        <form id="login-form" class="login-form">
          <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text" id="login-user" placeholder="Usuario" autocomplete="username" required>
          </div>
          <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="login-pass" placeholder="Contraseña" autocomplete="current-password" required>
          </div>
          <button type="submit" class="btn-login" id="btn-login">
            <span>Iniciar Sesión</span>
            <i class="fas fa-arrow-right"></i>
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- Main App -->
  <div id="app" class="app" style="display:none">
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <i class="fas fa-house-chimney"></i>
          <span class="sidebar-brand">La Casita</span>
        </div>
        <button id="sidebar-toggle" class="sidebar-toggle">
          <i class="fas fa-bars"></i>
        </button>
      </div>
      <nav class="sidebar-nav">
        <a href="#" data-page="dashboard" class="nav-item active" id="nav-dashboard">
          <i class="fas fa-chart-pie"></i>
          <span>Dashboard</span>
        </a>
        <a href="#" data-page="users" class="nav-item" id="nav-users">
          <i class="fas fa-users"></i>
          <span>Usuarios</span>
        </a>
        <a href="#" data-page="demos" class="nav-item" id="nav-demos">
          <i class="fas fa-clock"></i>
          <span>Demos</span>
        </a>
        <a href="#" data-page="resellers" class="nav-item admin-only" id="nav-resellers">
          <i class="fas fa-store"></i>
          <span>Resellers</span>
        </a>
        <a href="#" data-page="services" class="nav-item admin-only" id="nav-services">
          <i class="fas fa-server"></i>
          <span>Servicios</span>
        </a>
        <a href="#" data-page="logs" class="nav-item" id="nav-logs">
          <i class="fas fa-scroll"></i>
          <span>Logs</span>
        </a>
        <a href="#" data-page="settings" class="nav-item" id="nav-settings">
          <i class="fas fa-gear"></i>
          <span>Ajustes</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-user">
          <i class="fas fa-circle-user"></i>
          <span id="sidebar-username">Admin</span>
        </div>
        <button id="btn-logout" class="btn-logout">
          <i class="fas fa-right-from-bracket"></i>
          <span>Salir</span>
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="topbar">
        <button id="mobile-menu-toggle" class="mobile-menu-toggle">
          <i class="fas fa-bars"></i>
        </button>
        <h1 id="page-title" class="page-title">Dashboard</h1>
        <div class="topbar-right">
          <div class="topbar-status" id="connection-status">
            <span class="status-dot online"></span>
            <span>Conectado</span>
          </div>
        </div>
      </header>
      <div id="content" class="content">
        <!-- Dynamic content loaded here -->
      </div>
    </main>
  </div>

  <!-- Modal -->
  <div id="modal-overlay" class="modal-overlay" style="display:none">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h2 id="modal-title">Modal</h2>
        <button id="modal-close" class="modal-close">&times;</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
      <div id="modal-footer" class="modal-footer"></div>
    </div>
  </div>

  <!-- Toast notifications -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Scripts -->
  <script src="/js/api.js"></script>
  <script src="/js/components/modal.js"></script>
  <script src="/js/components/sidebar.js"></script>
  <script src="/js/components/topbar.js"></script>
  <script src="/js/modules/dashboard.js"></script>
  <script src="/js/modules/users.js"></script>
  <script src="/js/modules/demos.js"></script>
  <script src="/js/modules/resellers.js"></script>
  <script src="/js/modules/services.js"></script>
  <script src="/js/modules/logs.js"></script>
  <script src="/js/modules/settings.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
